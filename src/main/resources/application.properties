spring.application.name=like_hero_to_zero
spring.datasource.url=jdbc:mysql://localhost:3306/likeherotozero?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=lh_user
spring.datasource.password=lh_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server-Port
server.port=8080
