<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ländervergleich - Like Hero To Zero</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .nav-link a {
            background-color: white;
            color: #667eea;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            display: inline-block;
            margin-right: 10px;
        }

        .nav-link a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .chart-card {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .chart-card h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .chart-card .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab {
            padding: 12px 25px;
            background-color: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
            text-decoration: none;
            color: #333;
        }

        .tab.active {
            background-color: #667eea;
            color: white;
        }

        .tab:hover {
            background-color: #5568d3;
            color: white;
        }

        .chart-container {
            position: relative;
            height: 600px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
            }

            .chart-card {
                padding: 30px 20px;
            }

            .chart-card h1 {
                font-size: 2em;
            }

            .chart-container {
                height: 400px;
            }
        }
    </style>
</head>
<body>
<div class="navbar">
    <div class="nav-link">
        <a href="/">← Zur Startseite</a>
        <a href="/dashboard">📊 Dashboard</a>
    </div>
</div>

<div class="container">
    <div class="chart-card">
        <h1>🌍 Ländervergleich CO2-Emissionen</h1>
        <p class="subtitle">Aktuelle CO2-Emissionen im Vergleich (neueste verfügbare Daten)</p>

        <div class="tabs">
            <a href="/charts" class="tab">📊 Zeitverlauf</a>
            <a href="/charts/comparison" class="tab active">🌍 Ländervergleich</a>
        </div>

        <div class="chart-container">
            <canvas id="comparisonChart"></canvas>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('comparisonChart').getContext('2d');

    const countryNames = /*[[${countryNames}]]*/ [];
    const latestValues = /*[[${latestValues}]]*/ [];

    // Farben für die Balken generieren
    const colors = [
        '#667eea', '#764ba2', '#f093fb', '#4facfe',
        '#43e97b', '#fa709a', '#fee140', '#30cfd0',
        '#a8edea', '#fed6e3'
    ];

    const chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: countryNames,
            datasets: [{
                label: 'CO2 Emissionen (kt)',
                data: latestValues,
                backgroundColor: colors,
                borderColor: colors.map(c => c),
                borderWidth: 2,
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                    padding: 12,
                    titleFont: {
                        size: 14,
                        weight: 'bold'
                    },
                    bodyFont: {
                        size: 13
                    },
                    callbacks: {
                        label: function(context) {
                            return 'CO2 Emissionen: ' +
                                context.parsed.y.toLocaleString('de-DE') + ' kt';
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) {
                            return value.toLocaleString('de-DE') + ' kt';
                        },
                        font: {
                            size: 12
                        }
                    },
                    grid: {
                        color: 'rgba(0, 0, 0, 0.05)'
                    }
                },
                x: {
                    ticks: {
                        font: {
                            size: 12,
                            weight: 'bold'
                        }
                    },
                    grid: {
                        display: false
                    }
                }
            }
        }
    });
</script>
</body>
</html>
